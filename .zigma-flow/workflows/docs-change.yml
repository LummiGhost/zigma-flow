name: docs-change
version: 0.6.0

inputs:
  task:
    type: string
    required: true

skills:
  code:
    uses: skill://zigma.code-change@1

permissions:
  contents: read
  edits: write
  commands: none
  workflow_state: none

jobs:
  scope:
    steps:
      - id: scope
        type: agent
        with:
          task: "${{ inputs.task }}"
        outputs:
          scope: {}
        expose:
          skills:
            - code

  source-map:
    needs:
      - scope
    steps:
      - id: map
        type: agent
        with:
          task: "${{ inputs.task }}"
        outputs:
          sources: {}
        expose:
          skills:
            - code

  draft:
    needs:
      - source-map
    steps:
      - id: draft
        type: agent
        with:
          task: "${{ inputs.task }}"
        outputs:
          draft: {}
        expose:
          skills:
            - code

  consistency-check:
    needs:
      - draft
    steps:
      - id: check
        type: script
        run: "git status"
        on_failure: fail

  review:
    needs:
      - consistency-check
    steps:
      - id: review
        type: agent
        with:
          task: "${{ inputs.task }}"
        outputs:
          verdict: {}
          issues: {}
        expose:
          skills:
            - code

  summarize:
    needs:
      - review
    steps:
      - id: summarize
        type: agent
        with:
          task: "Summarize the documentation change. Cite evidence from the scope artifact and draft artifact for each key claim."
        outputs:
          final_summary: {}
        expose:
          skills:
            - code
