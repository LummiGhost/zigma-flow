name: design-review
version: 0.6.0

inputs:
  design_doc:
    type: string
    required: true

permissions:
  contents: read
  edits: none
  commands: none
  workflow_state: none

jobs:
  intake:
    steps:
      - id: capture
        type: agent
        with:
          task: "${{ inputs.design_doc }}"
        outputs:
          design_summary: {}

  context-map:
    needs:
      - intake
    steps:
      - id: capture-context
        type: agent
        with:
          task: "Map the design context for: ${{ inputs.design_doc }}. Identify scope, dependencies, and constraints."
        outputs:
          scope: {}
          dependencies: {}
          constraints: {}

  alternatives:
    needs:
      - context-map
    steps:
      - id: document-alternatives
        type: agent
        with:
          task: "Document alternative approaches for: ${{ inputs.design_doc }}. For each alternative, describe the approach, trade-offs, and feasibility."
        outputs:
          alternatives_doc: {}

  risk-review:
    needs:
      - alternatives
    steps:
      - id: assess-risks
        type: agent
        with:
          task: "Assess risks for: ${{ inputs.design_doc }}. Evaluate technical, operational, and migration risks."
        outputs:
          risk_doc: {}

  human-gate:
    needs:
      - risk-review
    steps:
      - id: decide
        type: human
        prompt: |
          Review the design proposal: ${{ inputs.design_doc }}

          Before deciding, review the artifacts from earlier jobs:
          - design_summary (intake)
          - scope, dependencies, constraints (context-map)
          - alternatives analysis (alternatives)
          - risk assessment (risk-review)

          Approve to proceed to the decision summary, or reject to block the workflow.
        inputs:
          decision:
            type: string
            enum: [approve, reject]
            required: true
        timeout_minutes: 1440

  decision-summary:
    needs:
      - human-gate
    steps:
      - id: route
        type: router
        switch: "${{ jobs.human-gate.outputs.decision }}"
        cases:
          approved: continue
          rejected:
            status: blocked
          default:
            status: blocked
      - id: summarize
        type: agent
        with:
          task: |
            Produce a decision summary for the design review of: ${{ inputs.design_doc }}

            Reference artifacts from previous jobs:
            - design_summary (intake)
            - scope, dependencies, constraints (context-map)
            - alternatives analysis (alternatives)
            - risk assessment (risk-review)

            Document the final decision, supporting rationale, and any conditions or follow-up actions.
        outputs:
          final_summary: {}
