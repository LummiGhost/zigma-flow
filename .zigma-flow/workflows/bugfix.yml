name: bugfix
version: 0.7.0

inputs:
  bug_report:
    type: string
    required: true
  affected_component:
    type: string
    required: false

skills:
  code:
    uses: skill://zigma.code-change@1

permissions:
  contents: read
  edits: write
  commands: none
  workflow_state: none

job_groups:
  fix-verify:
    repeat:
      max_iterations: 3
      until: "${{ jobs.review.outputs.verdict == 'approved' }}"

jobs:
  intake:
    steps:
      - id: analyze
        type: agent
        with:
          task: "${{ inputs.bug_report }}"
        outputs:
          bug_summary: {}
          affected_files: {}
        expose:
          skills:
            - code

  reproduce:
    needs:
      - intake
    steps:
      - id: reproduce
        type: agent
        with:
          task: "Reproduce the bug described in: ${{ inputs.bug_report }}. Document the exact steps and conditions that trigger the bug."
        outputs:
          reproduce_artifact: {}
          is_reproducible: {}
        expose:
          skills:
            - code

  diagnose:
    needs:
      - reproduce
    steps:
      - id: diagnose
        type: agent
        with:
          task: "Diagnose the root cause of the bug. For EACH statement in your analysis, classify it as: OBSERVED EVIDENCE (directly verified), INFERENCE (logically derived from evidence), or UNVERIFIED ASSUMPTION (not yet confirmed). Bug: ${{ inputs.bug_report }}"
        outputs:
          root_cause: {}
          evidence_map: {}
        expose:
          skills:
            - code

  plan:
    needs:
      - diagnose
    steps:
      - id: plan
        type: agent
        with:
          task: "${{ inputs.bug_report }}"
        outputs:
          fix_plan: {}
          risk_assessment: {}
        expose:
          skills:
            - code

  implement:
    group: fix-verify
    needs:
      - plan
    retry:
      max_attempts: 3
      when:
        - timeout
        - infrastructure_error
        - agent_error
      on_exceeded:
        status: failed
    steps:
      - id: implement
        type: agent
        with:
          task: "${{ inputs.bug_report }}"
          previous_summary: "${{ iteration.previous.jobs.implement.outputs.summary }}"
        outputs:
          summary: {}
          files_changed: {}
        expose:
          skills:
            - code
      - id: collect-diff
        type: script
        run: "git diff HEAD"
        on_failure: fail

  regression-test:
    group: fix-verify
    needs:
      - implement
    failure_policy: continue
    steps:
      - id: run-tests
        type: script
        run: "pnpm test:ci"
        on_failure: fail
      - id: verify-fix
        type: agent
        with:
          task: "Verify that the bug is fixed and write a regression test verification report. The test output is in the previous script step artifact."
        outputs:
          regression_test_artifact: {}
          fix_verified: {}
        expose:
          skills:
            - code

  review:
    group: fix-verify
    needs:
      - regression-test
    steps:
      - id: review
        type: agent
        with:
          task: "${{ inputs.bug_report }}"
          attempt: "${{ attempt.number }}"
        outputs:
          verdict: {}
          issues: {}
        returns:
          status:
            values: [approved, rejected]
        on_return:
          approved: continue
          rejected: continue
        expose:
          skills:
            - code

  summarize:
    needs:
      - review
    steps:
      - id: summarize
        type: agent
        with:
          task: "Summarize the bug fix. Cite evidence from the reproduce_artifact and regression_test_artifact. Every factual claim must reference its source artifact."
        outputs:
          final_summary: {}
          remaining_risks: {}
        expose:
          skills:
            - code
