name: release-candidate
version: 0.6.0

inputs:
  version:
    type: string
    required: true

permissions:
  contents: read
  edits: none
  commands: none
  workflow_state: none

jobs:
  scope-freeze:
    steps:
      - id: document-scope
        type: agent
        with:
          task: "Document the scope of release candidate ${{ inputs.version }}. List all included changes, excluded items, and known risks based on git log and CHANGELOG.md."
        outputs:
          scope_summary: {}
          known_risks: {}

  build:
    needs:
      - scope-freeze
    steps:
      - id: build
        type: script
        run: "pnpm build"
        on_failure: fail

  typecheck:
    needs:
      - build
    steps:
      - id: typecheck
        type: script
        run: "pnpm typecheck"
        on_failure: fail

  unit:
    needs:
      - build
    steps:
      - id: unit-tests
        type: script
        run: "pnpm test:ci"
        on_failure: fail

  integration:
    needs:
      - unit
      - typecheck
    steps:
      - id: integration-tests
        type: script
        run: "pnpm test:ci --reporter verbose"
        on_failure: fail

  smoke:
    needs:
      - integration
    steps:
      - id: smoke-cli
        type: script
        shell: pwsh
        run: "if (-not (Test-Path 'dist/cli.js' -PathType Leaf)) { exit 1 }"
        on_failure: fail

  release-notes:
    needs:
      - smoke
    steps:
      - id: generate-notes
        type: agent
        with:
          task: "Generate release notes for version ${{ inputs.version }}. List new features, bug fixes, and breaking changes. Every item must reference a commit or PR number."
        outputs:
          release_notes: {}
          verification_log: {}

  tag-readiness-gate:
    needs:
      - release-notes
    steps:
      - id: approve-release
        type: human
        prompt: |
          Review release candidate ${{ inputs.version }} before tagging.

          Confirm all of the following:
          1. All CI stages passed
          2. Release notes are complete
          3. No blocking risks remain

          Review the scope summary, test results, and release notes. Check the known_risks
          output from scope-freeze for any unresolved risks before deciding.
        inputs:
          decision:
            type: string
            enum: [approve, reject]
            required: true
        timeout_minutes: 1440
