name: code-change
version: 0.7.0

inputs:
  task:
    type: string
    required: true

skills:
  code:
    uses: skill://zigma.code-change@1

permissions:
  contents: read
  edits: write
  commands: none
  workflow_state: none

job_groups:
  implement-review:
    repeat:
      max_iterations: 3
      until: "${{ jobs.review.outputs.verdict == 'approved' }}"

jobs:
  intake:
    steps:
      - id: analyze
        type: agent
        with:
          task: "${{ inputs.task }}"
        outputs:
          task_summary: {}
          scope: {}
        expose:
          skills:
            - code

  code-map:
    needs:
      - intake
    steps:
      - id: map
        type: agent
        with:
          task: "${{ inputs.task }}"
        outputs:
          files: {}
          modules: {}
        expose:
          skills:
            - code

  risk-scan:
    needs:
      - code-map
    steps:
      - id: validate
        type: script
        run: "git status"
        on_failure: fail

  plan:
    needs:
      - risk-scan
    steps:
      - id: plan
        type: agent
        with:
          task: "${{ inputs.task }}"
        outputs:
          plan_summary: {}
          steps: {}
        returns:
          status:
            values: [ready, needs_architecture_design]
        on_return:
          needs_architecture_design: { activate_job: architecture-design }
        expose:
          skills:
            - code

  architecture-design:
    activation: optional
    needs:
      - plan
    steps:
      - id: design
        type: agent
        with:
          task: "${{ inputs.task }}"
        expose:
          skills:
            - code

  implement:
    group: implement-review
    needs:
      - plan
      - architecture-design
    retry:
      max_attempts: 3
      when:
        - timeout
        - infrastructure_error
        - agent_error
      on_exceeded:
        status: failed
    steps:
      - id: implement
        type: agent
        with:
          task: "${{ inputs.task }}"
          previous_summary: "${{ iteration.previous.jobs.implement.outputs.summary }}"
        outputs:
          summary: {}
          files_changed: {}
        expose:
          skills:
            - code
      - id: collect-diff
        type: script
        run: "git diff HEAD"
        on_failure: fail

  static-check:
    group: implement-review
    needs:
      - implement
    failure_policy: continue
    steps:
      - id: check
        type: script
        run: "pnpm typecheck && pnpm lint"
        on_failure: fail

  unit-test:
    group: implement-review
    needs:
      - implement
    failure_policy: continue
    steps:
      - id: test
        type: script
        run: "pnpm test:ci"
        on_failure: fail

  review:
    group: implement-review
    needs:
      - static-check
      - unit-test
    steps:
      - id: review
        type: agent
        with:
          task: "${{ inputs.task }}"
          attempt: "${{ attempt.number }}"
        outputs:
          verdict: {}
          issues: {}
        returns:
          status:
            values: [approved, rejected]
        on_return:
          approved: continue
          rejected: continue
        expose:
          skills:
            - code

  summarize:
    needs:
      - review
    steps:
      - id: summarize
        type: agent
        with:
          task: "${{ inputs.task }}"
        outputs:
          final_summary: {}
          remaining_risks: {}
        expose:
          skills:
            - code
