name: code-change
entry: intake
version: 0.3.0

on:
  manual:
    inputs:
      task:
        type: string
        required: true

skills:
  code:
    uses: skill://zigma.code-change@1

permissions:
  contents: read
  edits: write
  commands: none
  workflow_state: none

signals:
  needs_architecture_design:
    severity: info
    priority: 50
    allowed_from:
      - plan
      - review
    action:
      activate_job: architecture-design

  review_rejected:
    severity: high
    priority: 100
    allowed_from:
      - review
    action:
      retry_job: implement

jobs:
  intake:
    workspace:
      mode: read-only
    steps:
      - id: analyze
        type: agent
        prompt: intake
        with:
          task: "${{ inputs.task }}"
        outputs:
          task_summary: {}
          scope: {}
          complexity_profile: {}
        expose:
          skills:
            - code

  code-map:
    needs:
      - intake
    workspace:
      mode: read-only
    steps:
      - id: map
        type: agent
        prompt: code-map
        with:
          task: "${{ inputs.task }}"
        outputs:
          existing_files: {}
          new_files: {}
          test_files: {}
          modules: {}
          risk_areas: {}
          rationale: {}
        expose:
          skills:
            - code

  risk-scan:
    needs:
      - code-map
    workspace:
      mode: read-only
    steps:
      - id: validate-report
        type: check
        uses: zigma/file-exists
        with:
          file: "jobs/code-map/attempts/1/steps/map/report.json"
        on_fail: fail
      - id: validate-outputs
        type: check
        uses: zigma/required-fields
        with:
          file: "jobs/code-map/attempts/1/steps/map/report.json"
          fields:
            - outputs
            - summary
        on_fail: fail

  plan:
    needs:
      - risk-scan
    workspace:
      mode: read-only
    steps:
      - id: plan
        type: agent
        prompt: plan
        with:
          task: "${{ inputs.task }}"
        outputs:
          plan_summary: {}
          steps: {}
          risks: {}
          validation_commands: {}
          contracts_to_preserve: {}
          out_of_scope: {}
        expose:
          skills:
            - code

  architecture-design:
    activation: "manual"
    needs:
      - plan
    workspace:
      mode: read-only
    steps:
      - id: design
        type: agent
        prompt: architecture-design
        with:
          task: "${{ inputs.task }}"
        expose:
          skills:
            - code

  implement:
    needs:
      - plan
    optional_needs:
      - architecture-design
    retry:
      max_attempts: 3
      on_exceeded:
        status: failed
    steps:
      - id: implement
        type: agent
        prompt: implement
        with:
          task: "${{ inputs.task }}"
        outputs:
          summary: {}
          files_changed: {}
        expose:
          skills:
            - code
      - id: collect-diff
        type: script
        run: "git diff HEAD"
        on_failure: fail

  static-check:
    needs:
      - implement
    workspace:
      mode: read-only
    steps:
      - id: check
        type: script
        run: "pnpm typecheck && pnpm lint"
        on_failure: fail

  unit-test:
    needs:
      - implement
    workspace:
      mode: read-only
    steps:
      - id: test
        type: script
        run: "pnpm test"
        on_failure: fail

  review:
    needs:
      - static-check
      - unit-test
    workspace:
      mode: read-only
    steps:
      - id: review
        type: agent
        prompt: review
        with:
          task: "${{ inputs.task }}"
        outputs:
          verdict: {}
          checked_files: {}
          checked_artifacts: {}
          validation_evidence: {}
          findings: {}
          accepted_risks: {}
          non_blocking_improvements: {}
        expose:
          skills:
            - code

  gate-merge:
    activation: "manual"
    needs:
      - review
    steps:
      - id: gate-merge
        type: human
        prompt: |
          Review the implementation summary and approve before merging.
        instructions: |
          Use `zigma-flow approve --job gate-merge` to proceed,
          or `zigma-flow reject --job gate-merge --comment "reason"` to send back.
        approvers: []
        outputs:
          decision: human.decision
          comment: human.comment

  summarize:
    needs:
      - review
    optional_needs:
      - gate-merge
    workspace:
      mode: read-only
    steps:
      - id: summarize
        type: agent
        prompt: summarize
        with:
          task: "${{ inputs.task }}"
        outputs:
          final_summary: {}
          remaining_risks: {}
          summary_artifact: {}
        required_artifacts:
          - summary.md
        expose:
          skills:
            - code
